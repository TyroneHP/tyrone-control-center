<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <title>Tyrone Control Center</title>
    <script>
      const pathSegmentsToKeep = 1
      const pageLocation = window.location

      pageLocation.replace(
        pageLocation.protocol +
          '//' +
          pageLocation.hostname +
          (pageLocation.port ? ':' + pageLocation.port : '') +
          pageLocation.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/?/' +
          pageLocation.pathname
            .slice(1)
            .split('/')
            .slice(pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (pageLocation.search
            ? '&' + pageLocation.search.slice(1).replace(/&/g, '~and~')
            : '') +
          pageLocation.hash,
      )
    </script>
  </head>
  <body></body>
</html>
