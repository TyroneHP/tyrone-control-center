name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.12.0
          cache: npm
      - name: Validate required build secrets
        shell: bash
        run: |
          if [[ -z "$VITE_SUPABASE_URL" ]]; then
            echo "::error::Missing required GitHub secret VITE_SUPABASE_URL"
            exit 1
          fi
          if [[ -z "$VITE_SUPABASE_PUBLISHABLE_KEY" ]]; then
            echo "::error::Missing required GitHub secret VITE_SUPABASE_PUBLISHABLE_KEY"
            exit 1
          fi
      - name: Install dependencies
        run: npm ci
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Build production application
        run: npm run build
      - name: Scan repository and build for secrets
        run: npm run security:scan
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./dist
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
