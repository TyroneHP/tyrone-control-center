<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#071526" />
    <title>CoreGrid</title>
  </head>
  <body>
    <script>
      ;(function restoreGitHubPagesRoute(location) {
        if (location.search.startsWith('?/')) {
          const restoredPath = location.search
            .slice(2)
            .split('&')
            .map((part) => part.replace(/~and~/g, '&'))
            .join('?')

          window.history.replaceState(
            null,
            '',
            location.pathname + restoredPath + location.hash,
          )
        }
      })(window.location)
    </script>
    <script>
      ;(function applyStoredTheme() {
        var theme = 'dark'
        try {
          var raw = window.localStorage.getItem('tcc.device-preferences.v1')
          var stored = raw ? JSON.parse(raw).theme : null
          if (stored === 'light' || stored === 'dark') theme = stored
        } catch (_) {
          theme = 'dark'
        }
        document.documentElement.dataset.theme = theme
      })()
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
